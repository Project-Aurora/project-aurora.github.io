<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FTD Decoy Calculator</title>
<style>
  :root { --bg: #1a1a2e; --surface: #16213e; --border: #0f3460; --accent: #e94560; --text: #eee; --muted: #888; --good: #4ade80; --warn: #facc15; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 1rem; max-width: 960px; margin: 0 auto; }
  h1 { font-size: 1.4rem; margin-bottom: 0.5rem; color: var(--accent); }
  h2 { font-size: 1.1rem; margin: 1rem 0 0.5rem; color: var(--accent); }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.5rem; margin-bottom: 1rem; }
  label { display: flex; flex-direction: column; font-size: 0.8rem; color: var(--muted); }
  label span { margin-bottom: 2px; }
  input, select { background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 0.4rem; font-size: 0.9rem; }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  .checkbox-row { flex-direction: row; align-items: center; gap: 0.4rem; }
  .checkbox-row input { width: auto; }
  .summary-box { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 0.75rem; font-family: monospace; font-size: 0.85rem; white-space: pre; line-height: 1.5; margin-bottom: 1rem; overflow-x: auto; }
  table { border-collapse: collapse; width: 100%; table-layout: fixed; font-family: monospace; font-size: 0.82rem; margin-bottom: 1rem; }
  th, td { padding: 0.3rem 0.6rem; text-align: right; border-bottom: 1px solid var(--border); white-space: nowrap; }
  th:first-child, td:first-child { text-align: left; }
  th { color: var(--accent); font-weight: 600; border-bottom: 2px solid var(--border); position: sticky; top: 0; background: var(--bg); }
  tr.highlight { background: rgba(233, 69, 96, 0.15); }
  tr.zero { color: var(--muted); }
  .table-wrap { max-height: 50vh; overflow-y: auto; border: 1px solid var(--border); border-radius: 6px; }
  .marker { color: var(--accent); font-weight: bold; }
</style>
</head>
<body>
<h1>FTD Decoy Missile Calculator</h1>

<p style="font-size:0.85rem;color:var(--muted);margin-bottom:0.5rem;">Select detection range depending on seeker. Radar detection range for Radar seekers and so on.</p>
<div class="grid">
  <label><span>Detection Range (m)</span><input type="number" id="targetSignal" value="5000" min="1" step="100"></label>
  <label><span>Decoy Missile Size</span>
    <select id="size"><option value="S">S</option><option value="M" selected>M</option><option value="L">L</option><option value="H">H</option></select>
  </label>
  <label><span>Decoy Missiles</span><input type="number" id="missiles" value="1" min="1" max="50"></label>
  <label><span>Target % Success</span><input type="number" id="targetPct" value="90" min="1" max="100"></label>
  <label class="checkbox-row"><input type="checkbox" id="simpleIr"><span>Single Pixel IR Seeker</span></label>
  <label class="checkbox-row"><input type="checkbox" id="processor"><span>Signal Processor</span></label>
</div>

<h2>Geometry (optional)</h2>
<div class="grid">
  <label><span>Ship Range (m)</span><input type="number" id="rangeShip" value="" placeholder="co-located"></label>
  <label><span>Decoy Range (m)</span><input type="number" id="rangeDecoy" value="" placeholder="co-located"></label>
</div>

<h2>Budget Optimization (optional)</h2>
<div class="grid">
  <label><span>Ammo Budget (ammo/s)</span><input type="number" id="budget" value="" placeholder="none"></label>
  <label><span>Max Launchers</span><input type="number" id="maxLaunchers" value="" placeholder="unlimited"></label>
</div>

<div id="summary" class="summary-box"></div>
<h2>Decoy Components Table</h2>
<div class="table-wrap"><table id="mainTable"></table></div>
<div id="budgetSection" style="display:none">
  <h2>Budget Optimization</h2>
  <div id="budgetSummary" class="summary-box"></div>
  <div class="table-wrap"><table id="budgetTable"></table></div>
</div>

<script>
const SIZES = {
  S: { area: 0.25, volume: 0.125, scale: 0.5, componentLength: 0.25 },
  M: { area: 1.0, volume: 1.0, scale: 1.0, componentLength: 0.5 },
  L: { area: 4.0, volume: 8.0, scale: 2.0, componentLength: 1.0 },
  H: { area: 16.0, volume: 64.0, scale: 4.0, componentLength: 2.0 },
};
const BASE_DECOY_SIGNAL = 1600;
const BASE_AMMO_COST = 20;
const BASE_RELOAD_TIME = 10;
const SEEKERS = {
  ir:       { min: 0.1, max: 1.0, procFactor: 0.4, defaultCone: 60 },
  radar:    { min: 0.1, max: 1.0, procFactor: 0.4, defaultCone: 180 },
  sonar:    { min: 0.1, max: 1.0, procFactor: 0.4, defaultCone: 60 },
  simpleIr: { min: 0.15, max: 0.3, procFactor: 1.0, defaultCone: 30 },
};

function rangeFalloff(r) { return 1.0 / (1.0 + r / 1000.0); }
function angleModifier(angle, maxAngle) {
  if (angle > maxAngle || maxAngle <= 0) return 0.0;
  return 1.0 / (1.0 + 9.0 * angle / maxAngle);
}
function decoySignal(k, area) { return k * BASE_DECOY_SIGNAL * area; }
function multRange(seekerType, hasProcessor) {
  const s = SEEKERS[seekerType];
  const f = hasProcessor ? s.procFactor : 1.0;
  return [s.min * f, s.max * f];
}
function effectiveTau(targetSig, decoySig, rShip, rDecoy, aShip, aDecoy, cone) {
  const shipScore = targetSig * rangeFalloff(rShip) * angleModifier(aShip, cone);
  const decoyBase = decoySig * rangeFalloff(rDecoy) * angleModifier(aDecoy, cone);
  if (decoyBase <= 0) return Infinity;
  return shipScore / decoyBase;
}
function pSingleDecoyWins(tau, mMin, mMax) {
  if (tau <= mMin) return 1.0;
  if (tau >= mMax) return 0.0;
  return (mMax - tau) / (mMax - mMin);
}
function pAnyDecoyWins(pSingle, n) { return 1.0 - Math.pow(1.0 - pSingle, n); }
function ammoCost(k, vol) { return BASE_AMMO_COST * vol * k; }
function reloadTime(k, cl) { return BASE_RELOAD_TIME * Math.sqrt(cl * k); }

function getVal(id) { return document.getElementById(id).value; }
function getNum(id) { const v = getVal(id); return v === '' ? null : parseFloat(v); }
function getInt(id) { const v = getVal(id); return v === '' ? null : parseInt(v, 10); }

function calculate() {
  const targetSig = getNum('targetSignal') || 5000;
  const sizeKey = getVal('size');
  const size = SIZES[sizeKey];
  const seekerType = document.getElementById('simpleIr').checked ? 'simpleIr' : 'radar';
  const missiles = getInt('missiles') || 1;
  const targetPct = (getNum('targetPct') || 90) / 100.0;
  let maxK = 10;
  const hasProcessor = document.getElementById('processor').checked;
  const [mMin, mMax] = multRange(seekerType, hasProcessor);
  const cone = SEEKERS[seekerType].defaultCone;

  const rShipRaw = getNum('rangeShip');
  const rDecoyRaw = getNum('rangeDecoy');
  const hasGeo = rShipRaw !== null || rDecoyRaw !== null;
  const rShip = rShipRaw ?? 0;
  const rDecoy = rDecoyRaw ?? 0;
  const aShip = 0;
  const aDecoy = 0;

  function calcTau(k) {
    const sig = decoySignal(k, size.area);
    if (hasGeo) return effectiveTau(targetSig, sig, rShip, rDecoy, aShip, aDecoy, cone);
    return targetSig / sig;
  }

  // Summary
  let lines = [];
  lines.push(`Detection range:  ${targetSig.toFixed(0)}m`);
  lines.push(`Missile size:     ${sizeKey} (area=${size.area}x)`);
  lines.push(`Signal processor: ${hasProcessor ? 'yes' : 'no'}`);
  lines.push(`Decoy missiles:   ${missiles}`);
  if (hasGeo) {
    lines.push(`Ship range:       ${rShip.toFixed(0)}m  angle: ${aShip.toFixed(0)}\u00b0`);
    lines.push(`Decoy range:      ${rDecoy.toFixed(0)}m  angle: ${aDecoy.toFixed(0)}\u00b0`);
    const aModDecoy = angleModifier(aDecoy, cone);
    const geoFactor = aModDecoy > 0
      ? (rangeFalloff(rShip) / rangeFalloff(rDecoy)) * (angleModifier(aShip, cone) / aModDecoy)
      : Infinity;
    lines.push(`Geometry factor:  ${geoFactor.toFixed(2)}x (>1 = ship favored, <1 = decoy favored)`);
  } else {
    lines.push(`Geometry:         co-located (worst case for decoy)`);
  }

  // Find min K
  let minK = null;
  for (let k = 1; k < 200; k++) {
    const tau = calcTau(k);
    const pOne = pSingleDecoyWins(tau, mMin, mMax);
    const pAny = pAnyDecoyWins(pOne, missiles);
    if (pAny >= targetPct) { minK = k; break; }
  }
  lines.push('');
  if (minK !== null) {
    const sig = decoySignal(minK, size.area);
    const cost = ammoCost(minK, size.volume);
    const reload = reloadTime(minK, size.componentLength);
    const tau = calcTau(minK);
    const pOne = pSingleDecoyWins(tau, mMin, mMax);
    const pAny = pAnyDecoyWins(pOne, missiles);
    lines.push(`Min decoy components for ${(targetPct*100).toFixed(0)}%: ${minK}`);
    lines.push(`  signal=${sig.toFixed(0)}  ammo=${cost.toFixed(1)}  reload=${reload.toFixed(1)}s  P=${(pAny*100).toFixed(1)}%`);
  } else {
    lines.push(`Cannot reach ${(targetPct*100).toFixed(0)}% with \u2264199 decoy components`);
  }
  document.getElementById('summary').textContent = lines.join('\n');

  // Expand max K
  if (minK !== null && minK > maxK - 5) maxK = minK + 5;

  // Find last zero K
  let lastZeroK = 0;
  for (let k = 1; k <= maxK; k++) {
    const tau = calcTau(k);
    const pOne = pSingleDecoyWins(tau, mMin, mMax);
    const pAny = pAnyDecoyWins(pOne, missiles);
    if (pAny <= 0) lastZeroK = k;
  }

  // Main table
  const tbl = document.getElementById('mainTable');
  let html = '<thead><tr><th>Decoy Components</th><th>Signal</th><th>Ammo</th><th>Ammo/s</th><th>Reload</th><th>Probability(1)</th>';
  if (missiles > 1) html += `<th>Probability(${missiles})</th>`;
  html += '</tr></thead><tbody>';
  for (let k = 1; k <= maxK; k++) {
    if (k < lastZeroK) continue;
    const sig = decoySignal(k, size.area);
    const tau = calcTau(k);
    const cost = ammoCost(k, size.volume);
    const reload = reloadTime(k, size.componentLength);
    const pOne = pSingleDecoyWins(tau, mMin, mMax);
    const pAny = pAnyDecoyWins(pOne, missiles);
    const cls = k === minK ? ' class="highlight"' : (pAny <= 0 ? ' class="zero"' : '');
    html += `<tr${cls}><td>${k}</td><td>${sig.toFixed(0)}</td><td>${cost.toFixed(0)}</td><td>${(cost/reload).toFixed(1)}</td><td>${reload.toFixed(1)}s</td><td>${(pOne*100).toFixed(1)}%</td>`;
    if (missiles > 1) html += `<td>${(pAny*100).toFixed(1)}%</td>`;
    html += '</tr>';
  }
  html += '</tbody>';
  tbl.innerHTML = html;

  // Budget optimization
  const budget = getNum('budget');
  const budgetSection = document.getElementById('budgetSection');
  if (budget !== null && budget > 0) {
    budgetSection.style.display = '';
    const maxLaunchers = getInt('maxLaunchers');

    let rows = [];
    let pastPerfect = 0;
    for (let k = 1; k <= 99; k++) {
      const cost = ammoCost(k, size.volume);
      const reload = reloadTime(k, size.componentLength);
      const ammoPerSec = cost / reload;
      const tau = calcTau(k);
      const pOne = pSingleDecoyWins(tau, mMin, mMax);
      if (pOne <= 0) continue;
      const maxAffordable = Math.min(Math.floor(budget / ammoPerSec), maxLaunchers ?? Infinity);
      if (maxAffordable <= 0) continue;
      // Min launchers to meet target
      let minLaunchers;
      if (pOne >= 1.0) minLaunchers = 1;
      else minLaunchers = Math.ceil(Math.log(1 - targetPct) / Math.log(1 - pOne));
      const numLaunchers = Math.min(minLaunchers, maxAffordable);
      const pAny = pAnyDecoyWins(pOne, numLaunchers);
      const totalAmmo = numLaunchers * ammoPerSec;
      rows.push({ k, pOne, numLaunchers, totalAmmo, pAny, meetsTarget: pAny >= targetPct });
      // Stop a few rows after pOne hits 100%
      if (pOne >= 1.0) { pastPerfect++; if (pastPerfect >= 3) break; }
    }

    // Find best: meets target with least ammo; else highest pAny (least ammo if tied)
    let bestIdx = null;
    for (let i = 0; i < rows.length; i++) {
      const r = rows[i];
      if (bestIdx === null) { bestIdx = i; continue; }
      const best = rows[bestIdx];
      if (r.meetsTarget && !best.meetsTarget) { bestIdx = i; continue; }
      if (!r.meetsTarget && best.meetsTarget) continue;
      if (r.meetsTarget && best.meetsTarget) {
        if (r.totalAmmo < best.totalAmmo - 0.01) bestIdx = i;
      } else {
        if (r.pAny > best.pAny + 0.001) bestIdx = i;
        else if (Math.abs(r.pAny - best.pAny) < 0.001 && r.totalAmmo < best.totalAmmo - 0.01) bestIdx = i;
      }
    }

    let bLines = [`Budget: ${budget.toFixed(1)} ammo/sec`];
    if (maxLaunchers !== null) bLines.push(`Max launchers: ${maxLaunchers}`);
    if (bestIdx !== null) {
      const r = rows[bestIdx];
      bLines.push(`Optimal: ${r.k} decoy components  P=${(r.pAny*100).toFixed(1)}%`);
      bLines.push(`  P(1)=${(r.pOne*100).toFixed(1)}%  launchers=${r.numLaunchers}  ammo/s=${r.totalAmmo.toFixed(1)}`);
    } else {
      bLines.push('No affordable configuration');
    }
    document.getElementById('budgetSummary').textContent = bLines.join('\n');

    let bHtml = '<thead><tr><th>Decoy Components</th><th>Launchers</th><th>Ammo/s</th><th>Probability(1)</th><th>Probability(any)</th></tr></thead><tbody>';
    for (let i = 0; i < rows.length; i++) {
      const r = rows[i];
      const cls = bestIdx !== null && i === bestIdx ? ' class="highlight"' : '';
      const marker = bestIdx !== null && i === bestIdx ? ' <span class="marker">&larr;</span>' : '';
      bHtml += `<tr${cls}><td>${r.k}</td><td>${r.numLaunchers}</td><td>${r.totalAmmo.toFixed(1)}</td><td>${(r.pOne*100).toFixed(1)}%</td><td>${(r.pAny*100).toFixed(1)}%${marker}</td></tr>`;
    }
    bHtml += '</tbody>';
    document.getElementById('budgetTable').innerHTML = bHtml;
  } else {
    budgetSection.style.display = 'none';
  }
}

document.querySelectorAll('input, select').forEach(el => {
  el.addEventListener('input', calculate);
  el.addEventListener('change', calculate);
});
calculate();
</script>
</body>
</html>
